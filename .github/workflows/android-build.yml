name: Build Android APK

on:
  push:
    branches:
      - main # Déclenche la compilation à chaque fois que vous envoyez du code sur la branche 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer les dépendances du projet
        run: npm install

      - name: Synchroniser Capacitor avec le dossier Android
        run: npx cap sync

      - name: Compiler l'APK avec Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Sauvegarder le fichier APK généré
        uses: actions/upload-artifact@v4
        with:
          name: MonApp-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk