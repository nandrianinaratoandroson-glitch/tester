name: Build Android APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Installer Java (JDK 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Installer proprement les dépendances de Capacitor
      run: |
        npm ci || npm install
        npm install --save-dev @capacitor/cli
        npx chmod +x node_modules/.bin/cap || true

    - name: Synchroniser Capacitor avec le dossier Android
      run: npx --package=@capacitor/cli cap sync

    - name: Accorder les permissions d'exécution à Gradle
      run: chmod +x android/gradlew

    - name: Compiler l'APK avec Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Sauvegarder le fichier APK généré
      uses: actions/upload-artifact@v4
      with:
        name: MonApp-Android-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk